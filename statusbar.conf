# ─── Status Bar Config ───
# Import sau TPM init để override catppuccin
#
# Catppuccin Mocha color palette:
#   yellow=#f9e2af  blue=#89b4fa  teal=#94e2d5
#   green=#a6e3a1   pink=#f5c2e7  mauve=#cba6f7
#   peach=#fab387   red=#f38ba8   overlay=#585b70
#
# Context modes (nesting order):
#   LEFT:  PREFIX | COPY | SESSION + badges (ZOOM, SYNC, multi-session)
#   RIGHT: narrow → prefix → copy → zoomed → multi-pane → normal

set -g status-left-length 50
set -g status-right-length 120

# ─── Status Left: Mode indicator + Context badges ───
# Mode: PREFIX (peach) | COPY (red) | Session (blue)
# Badges: ZOOM (peach) | SYNC (red) | [2S] multi-session (mauve)
set -g status-left '\
#{?client_prefix,\
#[bg=#fab387 fg=#1e1e2e bold]  PREFIX ,\
#{?pane_in_mode,\
#[bg=#f38ba8 fg=#1e1e2e bold]  COPY ,\
#[bg=#89b4fa fg=#1e1e2e bold]  #S \
}}\
#{?window_zoomed_flag,#[bg=#fab387 fg=#1e1e2e bold]  ZOOM ,}\
#{?pane_synchronized,#[bg=#f38ba8 fg=#1e1e2e bold]  SYNC ,}\
#{?#{>:#{server_sessions},1},#[bg=#cba6f7 fg=#1e1e2e bold] #{server_sessions}S ,}\
#[bg=default fg=default] '

# ─── Status Right: Context-aware keybind hints ───
# Outer check: narrow terminal → hide all hints
set -g status-right '\
#{?#{<:#{client_width},120},\
#[fg=#89b4fa] %H:%M \
,\
#{?client_prefix,\
#[fg=#f9e2af]d#[fg=#89b4fa]:det \
#[fg=#f9e2af]s#[fg=#89b4fa]:list \
#[fg=#585b70]| \
#[fg=#f9e2af]c#[fg=#94e2d5]:win \
#[fg=#f9e2af]n#[fg=#94e2d5]:nxt \
#[fg=#585b70]| \
#[fg=#f9e2af]z#[fg=#a6e3a1]:zoom \
#[fg=#f9e2af]x#[fg=#a6e3a1]:kill \
#[fg=#585b70]| \
#[fg=#f9e2af]?#[fg=#cba6f7]:help\
,\
#{?pane_in_mode,\
#[fg=#f9e2af]v#[fg=#f5c2e7]:sel \
#[fg=#f9e2af]y#[fg=#f5c2e7]:yank \
#[fg=#f9e2af]/#[fg=#f5c2e7]:srch \
#[fg=#f9e2af]q#[fg=#f5c2e7]:quit \
#[fg=#585b70]| \
#[fg=#f9e2af]Space#[fg=#f5c2e7]:pg \
#[fg=#f9e2af]g#[fg=#f5c2e7]:top \
#[fg=#f9e2af]G#[fg=#f5c2e7]:bot\
,\
#{?window_zoomed_flag,\
#[fg=#f9e2af]z#[fg=#a6e3a1]:unzoom \
#[fg=#585b70]| \
#[fg=#f9e2af]?#[fg=#cba6f7]:help \
#[fg=#f9e2af]Spc#[fg=#cba6f7]:copy \
#[fg=#f9e2af]F#[fg=#cba6f7]:fzf \
#[fg=#585b70]| \
#[fg=#f9e2af]p#[fg=#cba6f7]:float\
,\
#{?#{>:#{window_panes},1},\
#[fg=#f9e2af]hjkl#[fg=#94e2d5]:nav \
#[fg=#585b70]| \
#[fg=#f9e2af]z#[fg=#a6e3a1]:zoom \
#[fg=#f9e2af]{#[fg=#a6e3a1]:swap \
#[fg=#585b70]| \
#[fg=#f9e2af]?#[fg=#cba6f7]:help \
#[fg=#f9e2af]Spc#[fg=#cba6f7]:copy\
,\
#[fg=#f9e2af]?#[fg=#cba6f7]:help \
#[fg=#f9e2af]Spc#[fg=#cba6f7]:copy \
#[fg=#f9e2af]F#[fg=#cba6f7]:fzf \
#[fg=#585b70]| \
#[fg=#f9e2af]p#[fg=#cba6f7]:float \
#[fg=#f9e2af]\#[fg=#cba6f7]:menu \
#[fg=#585b70]| \
#[fg=#f9e2af]C-s#[fg=#89b4fa]:save\
}}}} #[fg=#89b4fa] %H:%M }'

# ─── Window tab format: dùng #W thay vì #T ───
set -g window-status-format "#[fg=#11111b,bg=#{@thm_overlay_2}] #I #[fg=#cdd6f4,bg=#{@thm_surface_0}] #W "
set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_mauve}] #I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #W "
