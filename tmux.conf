# ~/.tmux.conf

# ─── Plugin Manager ───
set -g @plugin 'tmux-plugins/tpm'

# ─── Core Plugins ───
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'jaclu/tmux-menus'

# ─── New Plugins ───
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-floax'

# ─── Theme: Catppuccin Mocha ───
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# ─── Plugin Config ───
set -g @continuum-restore 'on'
set -g @floax-bind 'p'
set -g @menus_show_key_hints 'Yes'
set -g @floax-session-name 'scratch'

# Native clipboard via tmux OSC52 (no pbcopy/xclip/wl-copy)
set -s set-clipboard external
set -g @override_copy_command 'tmux load-buffer -w -'
set -g @thumbs-command 'tmux set-buffer -w -- "{}" && tmux display-message "Copied {}"'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- "{}" && tmux paste-buffer && tmux display-message "Copied {}"'
set -g @thumbs-multi-command 'tmux set-buffer -w -- "{}" && tmux paste-buffer && tmux display-message "Multi copied {}"'

# ─── Base Config ───
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g mode-keys vi
set -g history-limit 50000
set -sg escape-time 0
set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
set -g default-terminal "tmux-256color"
set -g extended-keys on
set -ag terminal-overrides ",xterm-256color:RGB"

# ─── Custom Keybindings ───
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind ? display-popup -w 60 -h 30 -E "cat ~/.tmux-help.txt && read -n 1"
bind C-y run-shell "tmux capture-pane -p -S - | tmux load-buffer -w - && tmux display-message 'Pane copied to clipboard'"

# ─── TPM Init ───
run '~/.tmux/plugins/tpm/tpm'

# ─── Floax Menu Override ───
# Use tmux's native display-menu instead of the plugin's menu wrapper.
unbind P
bind P if-shell -F '#{==:#{session_name},#{@floax-session-name}}' \
  'display-menu -T "FloaX" \
    "size down" - "run-shell \"~/.tmux/plugins/tmux-floax/scripts/zoom-options.sh in\"" \
    "size up" + "run-shell \"~/.tmux/plugins/tmux-floax/scripts/zoom-options.sh out\"" \
    "full screen" f "run-shell \"~/.tmux/plugins/tmux-floax/scripts/zoom-options.sh full\"" \
    "reset size" r "run-shell \"~/.tmux/plugins/tmux-floax/scripts/zoom-options.sh reset\"" \
    "embed in session" e "run-shell \"~/.tmux/plugins/tmux-floax/scripts/embed.sh embed\""' \
  'display-menu -T "FloaX" \
    "pop current window" p "run-shell \"~/.tmux/plugins/tmux-floax/scripts/embed.sh pop\""'

# ─── Status Bar (tách file riêng để dễ maintain) ───
source-file ~/.tmux/statusbar.conf
